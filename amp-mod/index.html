<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Démo Modulation d'Amplitude</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding-top: 50px; }
        .synth-card { background: #1e1e1e; display: inline-block; padding: 30px; border-radius: 15px; border: 1px solid #333; }
        input { width: 250px; display: block; margin: 10px auto; }
        button { background: #00e5ff; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        label { color: #bbb; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="synth-card">
        <h1>Modulation d'Amplitude</h1>
        <button id="power">ACTIVER LE SON</button>
        <hr style="margin: 20px 0; border: 0.5px solid #333;">

        <label>Fréquence Porteuse (Carrier): <span id="carVal">440</span> Hz</label>
        <input type="range" id="carrierFreq" min="20" max="1000" value="440">

        <label>Fréquence Modulatrice: <span id="modVal">8</span> Hz</label>
        <input type="range" id="modFreq" min="0.1" max="100" value="8" step="0.1">

        <label>Profondeur de Modulation: <span id="depthVal">50</span>%</label>
        <input type="range" id="modDepth" min="0" max="100" value="50">

        <label>Volume: <span id="volVal">40</span>%</label>
        <input type="range" id="volume" min="0" max="100" value="40">
    </div>

<script>
let ctx, modulator, modulatorGain, carrier, carrierGain, output;
let isStarted = false;

const powerBtn = document.getElementById('power');

powerBtn.onclick = () => {
    if (!isStarted) {
        ctx = new (window.AudioContext || window.webkitAudioContext)();

        // Carrier signal
        carrier = ctx.createOscillator();
        carrier.type = "sine";
        carrier.frequency.value = 440;

        // Modulator controls the carrier's amplitude
        modulator = ctx.createOscillator();
        modulator.type = "sine";
        modulator.frequency.value = 8;

        // Depth of amplitude modulation
        modulatorGain = ctx.createGain();
        modulatorGain.gain.value = 0.5;

        // Carrier VCA — modulator drives its gain
        carrierGain = ctx.createGain();
        carrierGain.gain.value = 0.5;

        output = ctx.createGain();
        output.gain.value = 0.4;

        // Connexions AM
        modulator.connect(modulatorGain);
        modulatorGain.connect(carrierGain.gain);
        carrier.connect(carrierGain);
        carrierGain.connect(output);
        output.connect(ctx.destination);

        carrier.start();
        modulator.start();

        powerBtn.textContent = "STOP";
        powerBtn.style.background = "#ff4081";
        isStarted = true;
        setupControls();
    } else {
        ctx.close();
        location.reload();
    }
};

function setupControls() {
    document.getElementById('carrierFreq').oninput = (e) => {
        carrier.frequency.setTargetAtTime(e.target.value, ctx.currentTime, 0.05);
        document.getElementById('carVal').textContent = e.target.value;
    };
    document.getElementById('modFreq').oninput = (e) => {
        modulator.frequency.setTargetAtTime(e.target.value, ctx.currentTime, 0.05);
        document.getElementById('modVal').textContent = e.target.value;
    };
    documehnt.getElementById('modDepth').oninput = (e) => {
        const depth = e.target.value / 100;
        modulatorGain.gain.setTargetAtTime(depth, ctx.currentTime, 0.05);
        carrierGain.gain.setTargetAtTime(1 - depth, ctx.currentTime, 0.05);
        document.getElementById('depthVal').textContent = e.target.value;
    };
    document.getElementById('volume').oninput = (e) => {
        output.gain.setTargetAtTime(e.target.value / 100, ctx.currentTime, 0.05);
        document.getElementById('volVal').textContent = e.target.value;
    };
}
</script>
</body>
</html>
