<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Démo Synthèse FM</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding-top: 50px; }
        .synth-card { background: #1e1e1e; display: inline-block; padding: 30px; border-radius: 15px; border: 1px solid #333; }
        input { width: 250px; display: block; margin: 10px auto; }
        button { background: #00e5ff; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        label { color: #bbb; font-size: 0.9rem; }
        canvas { display: block; margin: 10px auto; border-radius: 8px; max-width: 100%; }
        #fftCanvas { background: #0a0a0a; border: 1px solid #333; }
        .section-label { color: #555; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; margin: 15px 0 5px; }
        nav { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; margin-bottom: 15px; }
        nav a { background: #333; color: #aaa; padding: 6px 14px; border-radius: 4px; text-decoration: none; font-size: 0.8rem; font-weight: bold; transition: 0.2s; }
        nav a:hover { background: #555; color: #fff; }
        nav a.active { background: #00e5ff; color: #121212; }
    </style>
</head>
<body>

    <nav>
        <a href="../index.html">🏠 Index</a>
        <a href="../fm-synth/index.html" class="active">🎹 FM</a>
        <a href="../amp-mod/index.html">📢 AM</a>
        <a href="../waveforms/index.html">🔊 Waveforms</a>
        <a href="../frequency-shift/index.html">🌀 Freq Shift</a>
    </nav>

    <div class="synth-card">
        <h1>Synthétiseur FM</h1>
        <button id="power">ACTIVER LE SON</button>
        <hr style="margin: 20px 0; border: 0.5px solid #333;">

        <label>Fréquence Porteuse (Carrier): <span id="carVal">440</span> Hz</label>
        <input type="range" id="carrierFreq" min="20" max="1000" value="440">

        <label>Fréquence Modulatrice: <span id="modVal">200</span> Hz</label>
        <input type="range" id="modFreq" min="1" max="500" value="200">

        <label>Index de Modulation (Gain): <span id="depthVal">300</span></label>
        <input type="range" id="modDepth" min="0" max="1000" value="300">

        <label>Volume: <span id="volVal">30</span>%</label>
        <input type="range" id="volume" min="0" max="100" value="30">

        <div class="section-label">Spectre FFT</div>
        <canvas id="fftCanvas" width="400" height="120"></canvas>
    </div>

<script>
let ctx, modulator, modGain, carrier, output, analyser;
let isStarted = false;
let fftAnimId = null;
const fftCanvas = document.getElementById('fftCanvas');
const fCtx = fftCanvas.getContext('2d');

const powerBtn = document.getElementById('power');

powerBtn.onclick = () => {
    if (!isStarted) {
        // Initialisation (ton code adapté)
        ctx = new (window.AudioContext || window.webkitAudioContext)();
        
        modulator = ctx.createOscillator();
        modGain = ctx.createGain();
        carrier = ctx.createOscillator();
        output = ctx.createGain();

        // Configuration
        modulator.frequency.value = 200;
        modGain.gain.value = 300;
        carrier.frequency.value = 440;
        output.gain.value = 0.3;

        // Connexions FM
        modulator.connect(modGain);
        modGain.connect(carrier.frequency); // C'est ici que la magie FM opère
        analyser = ctx.createAnalyser();
        analyser.fftSize = 2048;
        carrier.connect(output);
        output.connect(analyser);
        analyser.connect(ctx.destination);
        startFFT();

        carrier.start();
        modulator.start();

        powerBtn.textContent = "STOP";
        powerBtn.style.background = "#ff4081";
        isStarted = true;
        setupControls();
    } else {
        if (fftAnimId) { cancelAnimationFrame(fftAnimId); fftAnimId = null; }
        ctx.close();
        ctx = null; analyser = null;
        fCtx.clearRect(0, 0, fftCanvas.width, fftCanvas.height);
        powerBtn.textContent = 'ACTIVER LE SON';
        powerBtn.style.background = '#00e5ff';
        isStarted = false;
    }
};

function setupControls() {
    // Liaison des sliders aux paramètres Web Audio
    document.getElementById('carrierFreq').oninput = (e) => {
        carrier.frequency.setTargetAtTime(e.target.value, ctx.currentTime, 0.05);
        document.getElementById('carVal').textContent = e.target.value;
    };
    document.getElementById('modFreq').oninput = (e) => {
        modulator.frequency.setTargetAtTime(e.target.value, ctx.currentTime, 0.05);
        document.getElementById('modVal').textContent = e.target.value;
    };
    document.getElementById('modDepth').oninput = (e) => {
        modGain.gain.setTargetAtTime(e.target.value, ctx.currentTime, 0.05);
        document.getElementById('depthVal').textContent = e.target.value;
    };
    document.getElementById('volume').oninput = (e) => {
        output.gain.setTargetAtTime(e.target.value / 100, ctx.currentTime, 0.05);
        document.getElementById('volVal').textContent = e.target.value;
    };
}

function startFFT() {
    const bufLen = analyser.frequencyBinCount;
    const data = new Uint8Array(bufLen);
    function drawFFT() {
        fftAnimId = requestAnimationFrame(drawFFT);
        analyser.getByteFrequencyData(data);
        const w = fftCanvas.width, h = fftCanvas.height;
        fCtx.clearRect(0, 0, w, h);
        const maxBin = Math.min(bufLen, Math.floor(8000 / (ctx.sampleRate / analyser.fftSize)));
        const barW = w / maxBin;
        for (let i = 0; i < maxBin; i++) {
            const v = data[i] / 255;
            const barH = v * h;
            const hue = 180 + (i / maxBin) * 140;
            fCtx.fillStyle = 'hsla(' + (hue % 360) + ',80%,55%,0.85)';
            fCtx.fillRect(i * barW, h - barH, Math.max(barW - 0.5, 1), barH);
        }
        fCtx.fillStyle = '#444'; fCtx.font = '9px sans-serif'; fCtx.textAlign = 'center';
        [500, 1000, 2000, 4000, 8000].forEach(f => {
            const xPos = (f / 8000) * w;
            if (xPos < w - 10) fCtx.fillText(f >= 1000 ? (f/1000)+'k' : f, xPos, 10);
        });
    }
    drawFFT();
}
</script>
</body>
</html>
