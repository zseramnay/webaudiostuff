<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Audio Frequency Shifter</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #1a1a1a; color: white; }
        .card { background: #2a2a2a; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; width: 350px; }
        button { background: #6200ee; color: white; border: none; padding: 12px 24px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-bottom: 20px; transition: 0.3s; }
        button:hover { background: #3700b3; }
        input[type=range] { width: 100%; margin: 20px 0; accent-color: #03dac6; }
        .stats { font-size: 1.2rem; color: #03dac6; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Freq Shifter</h2>
        <button id="startBtn">ACTIVATE MIC</button>
        <div>
            <label>Shift Amount</label>
            <input type="range" id="shiftSlider" min="-1000" max="1000" value="50" disabled>
            <div class="stats"><span id="freqVal">50</span> Hz</div>
        </div>
        <p style="font-size: 0.8rem; color: #888; margin-top: 20px;">Use headphones to avoid feedback!</p>
    </div>

    <script>
        const startBtn = document.getElementById('startBtn');
        const slider = document.getElementById('shiftSlider');
        const freqVal = document.getElementById('freqVal');
        
        let audioCtx;
        let shifterNode;

        startBtn.addEventListener('click', async () => {
            if (!audioCtx) {
                try {
                    // 1. Initialize Audio Context
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    
                    // 2. Load the Worklet Processor file
                    await audioCtx.audioWorklet.addModule('shifter-processor.js');

                    // 3. Request Microphone Access
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    const source = audioCtx.createMediaStreamSource(stream);

                    // 4. Create the Shifter Node
                    shifterNode = new AudioWorkletNode(audioCtx, 'shifter-processor');
                    const shiftParam = shifterNode.parameters.get('shift');

                    // 5. Connect the chain: Mic -> Shifter -> Speakers
                    source.connect(shifterNode).connect(audioCtx.destination);

                    // Enable UI
                    slider.disabled = false;
                    startBtn.textContent = "SYSTEM ACTIVE";
                    startBtn.style.background = "#03dac6";

                    // Handle Slider Changes
                    slider.oninput = (e) => {
                        const val = e.target.value;
                        freqVal.textContent = val;
                        // Smoothly transition to new frequency
                        shiftParam.setTargetAtTime(val, audioCtx.currentTime, 0.05);
                    };

                } catch (err) {
                    console.error("Audio initialization failed:", err);
                    alert("Please allow microphone access and use a local server.");
                }
            }
        });
    </script>
</body>
</html>
