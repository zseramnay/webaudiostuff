<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Audio Frequency Shifter</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 10px; box-sizing: border-box; background-color: #1a1a1a; color: white; }
        .card { background: #2a2a2a; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; width: 350px; }
        button { background: #6200ee; color: white; border: none; padding: 12px 24px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-bottom: 20px; transition: 0.3s; }
        button:hover { background: #3700b3; }
        input[type=range] { width: 100%; margin: 20px 0; accent-color: #03dac6; }
        .stats { font-size: 1.2rem; color: #03dac6; }
        canvas { display: block; margin: 10px auto; border-radius: 8px; width: 100%; box-sizing: border-box; }
        #fftCanvas { background: #1a1a1a; border: 1px solid #444; }
        .section-label { color: #888; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px; margin: 10px 0 5px; }
        nav { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; margin-bottom: 15px; }
        nav a { background: #444; color: #aaa; padding: 6px 14px; border-radius: 4px; text-decoration: none; font-size: 0.8rem; font-weight: bold; transition: 0.2s; }
        nav a:hover { background: #666; color: #fff; }
        nav a.active { background: #03dac6; color: #1a1a1a; }
    </style>
</head>
<body>

    <nav>
        <a href="../index.html">🏠 Index</a>
        <a href="../fm-synth/index.html">🎹 FM</a>
        <a href="../amp-mod/index.html">📢 AM</a>
        <a href="../waveforms/index.html">🔊 Waveforms</a>
        <a href="../frequency-shift/index.html" class="active">🌀 Freq Shift</a>
        <a href="../filter-explorer/index.html">🎛 Filters</a>
        <a href="../comb-filter/index.html">🔱 Comb</a>
    </nav>

    <div class="card">
        <h2>Freq Shifter</h2>
        <div style="display: flex; gap: 10px; justify-content: center; margin-bottom: 10px;">
            <button id="startBtn">ACTIVATE MIC</button>
            <label class="file-label" style="background: #6200ee; color: white; border: none; padding: 12px 24px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; display: inline-block;">
                LOAD FILE
                <input type="file" id="fileInput" accept="audio/*" style="display: none;">
            </label>
        </div>
        <button id="playBtn" style="display: none;">&#9654; PLAY</button>
        <div id="fileName" style="font-size: 0.8rem; color: #888; margin-bottom: 10px;"></div>
        <div>
            <label>Shift Amount</label>
            <input type="range" id="shiftSlider" min="-1000" max="1000" value="50" disabled>
            <div class="stats"><span id="freqVal">50</span> Hz</div>
        </div>
        <div>
            <label>Output Volume</label>
            <input type="range" id="volumeSlider" min="0" max="100" value="80" disabled>
            <div class="stats"><span id="volVal">80</span>%</div>
        </div>
        <div class="section-label">FFT Spectrum</div>
        <canvas id="fftCanvas" width="350" height="100"></canvas>

        <p style="font-size: 0.8rem; color: #888; margin-top: 20px;">Use headphones to avoid feedback!</p>
    </div>

    <script>
        const startBtn = document.getElementById('startBtn');
        const fileInput = document.getElementById('fileInput');
        const playBtn = document.getElementById('playBtn');
        const fileNameDiv = document.getElementById('fileName');
        const slider = document.getElementById('shiftSlider');
        const freqVal = document.getElementById('freqVal');
        const volumeSlider = document.getElementById('volumeSlider');
        const volVal = document.getElementById('volVal');
        
        let audioCtx;
        let shifterNode;
        let shiftParam;
        let gainNode;
        let analyser;
        let fftAnimId = null;
        const fftCanvas = document.getElementById('fftCanvas');
        const fCtx = fftCanvas.getContext('2d');
        let fileSource = null;
        let audioBuffer = null;
        let isPlaying = false;

        async function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                await audioCtx.audioWorklet.addModule('shifter-processor.js');
                shifterNode = new AudioWorkletNode(audioCtx, 'shifter-processor');
                shiftParam = shifterNode.parameters.get('shift');
                gainNode = audioCtx.createGain();
                gainNode.gain.value = volumeSlider.value / 100;
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 2048;
                shifterNode.connect(gainNode);
                gainNode.connect(analyser);
                analyser.connect(audioCtx.destination);
                startFFT();
                slider.disabled = false;
                volumeSlider.disabled = false;
                slider.oninput = (e) => {
                    const val = e.target.value;
                    freqVal.textContent = val;
                    shiftParam.setTargetAtTime(val, audioCtx.currentTime, 0.05);
                };
                volumeSlider.oninput = (e) => {
                    const val = e.target.value;
                    volVal.textContent = val;
                    gainNode.gain.setTargetAtTime(val / 100, audioCtx.currentTime, 0.05);
                };
            }
            if (audioCtx.state === 'suspended') await audioCtx.resume();
        }

        startBtn.addEventListener('click', async () => {
            if (startBtn.dataset.active) return;
            try {
                await initAudio();
                stopFilePlayback();
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const source = audioCtx.createMediaStreamSource(stream);
                source.connect(shifterNode);
                startBtn.dataset.active = '1';
                startBtn.textContent = "MIC ACTIVE";
                startBtn.style.background = "#03dac6";
            } catch (err) {
                console.error("Audio initialization failed:", err);
                alert("Please allow microphone access and use a local server.");
            }
        });

        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            try {
                await initAudio();
                const arrayBuffer = await file.arrayBuffer();
                audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                fileNameDiv.textContent = file.name;
                playBtn.style.display = 'inline-block';
                stopFilePlayback();
            } catch (err) {
                console.error("File decoding failed:", err);
                alert("Could not decode audio file.");
            }
        });

        function stopFilePlayback() {
            if (fileSource) {
                try { fileSource.stop(); } catch (_) {}
                fileSource.disconnect();
                fileSource = null;
            }
            isPlaying = false;
            playBtn.innerHTML = '&#9654; PLAY';
            playBtn.style.background = '#6200ee';
        }

        playBtn.addEventListener('click', () => {
            if (!audioBuffer) return;
            if (isPlaying) {
                stopFilePlayback();
                return;
            }
            fileSource = audioCtx.createBufferSource();
            fileSource.buffer = audioBuffer;
            fileSource.loop = true;
            fileSource.connect(shifterNode);
            fileSource.start();
            isPlaying = true;
            playBtn.innerHTML = '&#9724; STOP';
            playBtn.style.background = '#cf6679';
            fileSource.onended = () => {
                if (isPlaying) stopFilePlayback();
            };
        });

        function startFFT() {
            if (fftAnimId) return;
            const bufLen = analyser.frequencyBinCount;
            const data = new Uint8Array(bufLen);
            function drawFFT() {
                fftAnimId = requestAnimationFrame(drawFFT);
                analyser.getByteFrequencyData(data);
                const w = fftCanvas.width, h = fftCanvas.height;
                fCtx.clearRect(0, 0, w, h);
                const maxBin = Math.min(bufLen, Math.floor(8000 / (audioCtx.sampleRate / analyser.fftSize)));
                const barW = w / maxBin;
                for (let i = 0; i < maxBin; i++) {
                    const v = data[i] / 255;
                    const barH = v * h;
                    const hue = 180 + (i / maxBin) * 140;
                    fCtx.fillStyle = 'hsla(' + (hue % 360) + ',80%,55%,0.85)';
                    fCtx.fillRect(i * barW, h - barH, Math.max(barW - 0.5, 1), barH);
                }
                fCtx.fillStyle = '#666'; fCtx.font = '9px sans-serif'; fCtx.textAlign = 'center';
                [500, 1000, 2000, 4000, 8000].forEach(f => {
                    const xPos = (f / 8000) * w;
                    if (xPos < w - 10) fCtx.fillText(f >= 1000 ? (f/1000)+'k' : f, xPos, 10);
                });
            }
            drawFFT();
        }
    </script>
</body>
</html>
